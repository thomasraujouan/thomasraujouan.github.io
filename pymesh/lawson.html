<!DOCTYPE html>
<html>

<head>
  <title>Lawson surfaces</title>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="./pi.png">
  <script type="importmap">
  {
    "imports": {
      "xwebgl": "./modules/xwebgl.js",
      "xlab": "./modules/xlab.js",
      "wgl": "./modules/wgl.js"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</head>

<body>
  <script type="module">
    import { run } from "./main.js";
    const surfacePaths = [];
    for (let i = 0; i < 6; i++) {
      surfacePaths.push(`./surfaces/lawson/0${i}.wgl`)
    }
    run(surfacePaths);
  </script>
  <script type="module">
    import { wgl_to_json, loadFile } from "wgl"
    const file = await loadFile("./surfaces/lawson/01.wgl");
    wgl_to_json(file);
  </script>
</body>

</html>
