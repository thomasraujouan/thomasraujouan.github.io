<!DOCTYPE html>
<html>

<head>
  <title>PyMesh Lawson surfaces made without symmetries</title>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="./pi.png">
  <script type="importmap">
  {
    "imports": {
      "xwebgl": "./modules/xwebgl.js",
      "xlab": "./modules/xlab.js",
      "wgl": "./modules/wgl.js"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</head>

<body>
  <script type="module">
    import { run } from "./main.js";
    const directory = "./surfaces/pymesh-no-sym-lawson/"
    const surfacePaths = [];
    surfacePaths.push(directory + "button3.wgl");
    surfacePaths.push(directory + "cmcbutton4.wgl");
    surfacePaths.push(directory + "cmcdihedral5.wgl");
    surfacePaths.push(directory + "dihedral5.wgl");
    surfacePaths.push(directory + "button4.wgl");
    surfacePaths.push(directory + "cmcbutton5.wgl");
    surfacePaths.push(directory + "cmcpinched3.wgl");
    surfacePaths.push(directory + "pinched3.wgl");
    surfacePaths.push(directory + "button5.wgl");
    surfacePaths.push(directory + "cmcdihedral3.wgl");
    surfacePaths.push(directory + "dihedral3.wgl");
    surfacePaths.push(directory + "pinched4.wgl");
    surfacePaths.push(directory + "cmcbutton3.wgl");
    surfacePaths.push(directory + "cmcdihedral4.wgl");
    surfacePaths.push(directory + "dihedral4.wgl");
    surfacePaths.push(directory + "pinched5.wgl");

    run(surfacePaths);
  </script>
  <script type="module">
    import { wgl_to_json, loadFile } from "wgl"
    const file = await loadFile(directory + "lawsonS3pymesh.wgl");
    wgl_to_json(file);
  </script>
</body>

</html>
